<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Освітній Асистент</title>
    <!-- Загрузка Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Загрузка шрифта Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Применение шрифта Inter ко всему документу */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6; /* Светлый фон */
        }
        
        /* Анимация пульсации для имитации активности AI */
        @keyframes pulse-opacity-interactive {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.02); opacity: 1; }
        }
        
        /* Анимация для плавного появления фото */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .pulsing {
            animation: pulse-opacity-interactive 1.5s infinite ease-in-out;
        }

        /* Стиль кнопок: Снежный/Льодяний тон */
        .btn-primary {
            /* Градієнт: від світлого циан до дуже світлого блакитного */
            background: linear-gradient(145deg, #c7d2fe 0%, #a5b4fc 100%);
            color: #1e3a8a; /* Темно-синій текст */
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .btn-primary:hover:not(:disabled) {
            background: linear-gradient(145deg, #a5b4fc 0%, #818cf8 100%);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
            transform: translateY(-2px);
        }
        .btn-primary:disabled {
            background: #d1d5db;
            color: #6b7280;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Стиль поля для введення тексту */
        .input-style {
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .input-style:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.5);
        }

        /* Стиль для індикатора прогресу */
        .progress-bar {
            height: 8px;
            background-color: #4f46e5;
            width: 0%;
            transition: width 0.1s linear;
        }
    </style>
</head>
<body class="min-h-screen flex items-start justify-center p-4">

    <div class="w-full max-w-xl bg-white rounded-xl shadow-2xl p-6 md:p-8 mt-4 md:mt-12">
        
        <!-- Заголовок та Фото Асистента (Вертикально, як на скріншоті) -->
        <div class="flex flex-col items-center mb-6 text-center">
            <h1 class="text-3xl font-extrabold text-blue-900 leading-tight">AI Освітній Асистент 5-й Клас</h1>
            <p class="text-lg text-blue-500 font-semibold mt-1 mb-4">Ваш персональний помічник у навчанні</p>
            <!-- Фото асистента внизу -->
            <div id="assistant-photo" class="w-24 h-24 rounded-full overflow-hidden bg-gray-200 shadow-xl border-4 border-white transition duration-500 hover:scale-105" style="animation: fadeIn 1s ease-out forwards;">
                <!-- Placeholder image for the assistant -->
                <img src="https://placehold.co/96x96/6366f1/ffffff?text=🌟AI" alt="Фото асистента" class="w-full h-full object-cover">
            </div>
        </div>

        <!-- Поля вводу -->
        <form id="assistant-form" class="space-y-6">

            <!-- 1. Введіть ваше завдання -->
            <div>
                <label for="user-prompt" class="block text-sm font-medium text-gray-700 mb-2">Введіть ваше завдання</label>
                <textarea id="user-prompt" rows="3" class="input-style w-full p-3 border border-gray-300 rounded-lg focus:outline-none resize-none" placeholder="Наприклад: 'Допоможи мені зрозуміти тему дроби та як їх додавати.'" required></textarea>
            </div>

            <!-- 2. Оберіть предмет (Select) -->
            <div>
                <label for="subject-select" class="block text-sm font-medium text-gray-700 mb-2">Оберіть предмет</label>
                <select id="subject-select" class="input-style w-full p-3 border border-gray-300 rounded-lg bg-white focus:outline-none appearance-none cursor-pointer">
                    <option value="" disabled selected>-- Виберіть предмет --</option>
                    <option value="Математика">📚 Математика</option>
                    <option value="Українська мова">✍️ Українська мова</option>
                    <option value="Інформатика">💻 Інформатика</option>
                    <option value="Історія">🌟 Історія</option>
                    <option value="Географія">🌍 Географія</option>
                    <option value="Природознавство">🔬 Природознавство</option>
                    <option value="Інше">💡 Інше (загальне питання)</option>
                </select>
            </div>
            
            <!-- 3. Додаткові опції (Посилання / Фото) - для прикладу залишаємо мінімум -->
            <div class="flex flex-col sm:flex-row space-y-4 sm:space-y-0 sm:space-x-4">
                <div class="w-full sm:w-1/2">
                    <label for="book-url" class="block text-sm font-medium text-gray-700 mb-2">Посилання на книгу (URL)</label>
                    <input type="url" id="book-url" class="input-style w-full p-3 border border-gray-300 rounded-lg focus:outline-none" placeholder="https://example.com/pidruchnik">
                </div>
                <div class="w-full sm:w-1/2">
                    <label for="page-and-task" class="block text-sm font-medium text-gray-700 mb-2">Сторінка / Завдання</label>
                    <input type="text" id="page-and-task" class="input-style w-full p-3 border border-gray-300 rounded-lg focus:outline-none" placeholder="Стр. 45, Завд. 57">
                </div>
            </div>

            <!-- 4. Кнопка Отримати допомогу -->
            <div class="pt-4">
                <button type="submit" id="get-help-button" class="btn-primary w-full py-3 text-lg font-bold rounded-xl shadow-lg hover:shadow-xl transition duration-300">
                    Отримати допомогу асистента
                </button>
            </div>
        </form>

        <!-- Контейнер для прогресу (скритий за замовчуванням) -->
        <div id="progress-container" class="hidden mt-8">
            <p class="text-center text-blue-600 font-semibold mb-3">AI Асистент обробляє ваше завдання...</p>
            <div class="bg-gray-200 rounded-full overflow-hidden">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
        </div>

        <!-- Контейнер для результату (скритий за замовчуванням) -->
        <div id="result-container" class="hidden mt-8">
            <h2 class="text-xl font-bold text-blue-900 mb-4 border-b pb-2">Розв'язання та пояснення</h2>
            <div id="result-message" class="p-4 bg-blue-50 border border-blue-200 rounded-xl text-gray-800 leading-relaxed whitespace-pre-wrap">
                Тут буде відображено покрокове пояснення або розв'язання від AI.
            </div>
        </div>

    </div>

    <script>
        // Ініціалізація змінних
        const assistantForm = document.getElementById('assistant-form');
        const userPrompt = document.getElementById('user-prompt');
        const subjectSelect = document.getElementById('subject-select');
        const bookUrl = document.getElementById('book-url');
        const pageAndTask = document.getElementById('page-and-task');
        const getHelpButton = document.getElementById('get-help-button');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');
        const resultContainer = document.getElementById('result-container');
        const resultMessage = document.getElementById('result-message');
        const assistantPhoto = document.getElementById('assistant-photo');

        // --- Імітація прогрес-бару ---
        let progressInterval;
        let currentProgress = 0;

        function startProgressSimulation() {
            currentProgress = 0;
            progressBar.style.width = '0%';
            progressInterval = setInterval(() => {
                if (currentProgress < 95) {
                    // Збільшуємо повільно, щоб імітувати очікування
                    currentProgress += Math.random() * 2; 
                    progressBar.style.width = `${currentProgress}%`;
                }
            }, 100);
        }

        function stopProgressSimulation() {
            clearInterval(progressInterval);
            progressBar.style.width = '100%';
        }
        
        // --- Повторний виклик (для обробки помилок мережі) ---
        async function fetchWithRetry(url, options, retries = 3) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    return await response.json();
                } catch (error) {
                    console.error(`Attempt ${i + 1} failed:`, error);
                    if (i === retries - 1) throw error; 
                    await new Promise(resolve => setTimeout(resolve, Math.pow(2, i) * 1000)); // Експоненційна затримка
                }
            }
        }

        // --- Головний обробник форми ---
        assistantForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            // Перевірка наявності API Key
            const apiKey = "" // Залишити порожнім
            if (!userPrompt.value.trim()) {
                resultMessage.textContent = "Будь ласка, введіть ваше завдання.";
                resultContainer.classList.remove('hidden');
                resultContainer.classList.add('bg-yellow-100', 'border-yellow-300');
                return;
            }

            // Збір даних
            const task = userPrompt.value.trim();
            const subject = subjectSelect.value;
            const url = bookUrl.value.trim();
            const pageTask = pageAndTask.value.trim();

            let fullQuery = `Предмет: ${subject || 'Не вказано'}. `;
            if (url || pageTask) {
                fullQuery += `(Контекст: URL книги: ${url || 'Немає'}, Сторінка/Завдання: ${pageTask || 'Немає'}). `;
            }
            fullQuery += `Основне завдання: ${task}`;
            
            // UI підготовка до запиту
            getHelpButton.disabled = true;
            getHelpButton.textContent = 'Надсилаємо запит...';
            resultContainer.classList.add('hidden');
            progressContainer.classList.remove('hidden');
            assistantPhoto.classList.add('pulsing'); // Активація пульсації
            
            startProgressSimulation();

            try {
                // --- Реальний API-ЗАПИТ ---
                // Використовуємо gemini-2.5-flash-preview-09-2025 та інструмент Google Search
                const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

                const systemInstructionText = `Ви — доброзичливий, досвідчений вчитель-асистент для 5-го класу. Ваша мета — допомогти учню зрозуміти, як розв'язувати завдання, а не просто дати відповідь. Пояснюйте логіку, правила та кроки детально і заохочувальним тоном. Надайте відповідь виключно українською мовою.`;
                
                const payload = {
                    contents: [{ parts: [{ text: fullQuery }] }],
                    tools: [{ "google_search": {} }],
                    systemInstruction: {
                        parts: [{ text: systemInstructionText }]
                    },
                };

                const apiResponse = await fetchWithRetry(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                let generatedText = "Не вдалося отримати відповідь від AI. Спробуйте ще раз.";

                if (apiResponse && apiResponse.candidates && apiResponse.candidates.length > 0) {
                    generatedText = apiResponse.candidates[0].content.parts[0].text;
                }
                
                resultMessage.textContent = generatedText;
                // --- Кінець реального API-ЗАПИТУ ---

            } catch (error) {
                console.error("Помилка при виконанні запиту до AI:", error);
                resultMessage.textContent = `Помилка: Не вдалося отримати допомогу. Перевірте, чи правильно вказано API Key. Деталі: ${error.message}`;
                resultMessage.classList.add('bg-red-100', 'text-red-700', 'border-red-300');
            } finally {
                stopProgressSimulation();
                
                setTimeout(() => {
                    progressContainer.classList.add('hidden');
                    resultContainer.classList.remove('hidden');
                    getHelpButton.disabled = false;
                    getHelpButton.textContent = 'Отримати допомогу асистента';
                    assistantPhoto.classList.remove('pulsing'); // Деактивація пульсації
                }, 1000);
            }
        });
    </script>

</body>
</html>
