<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Освітній Асистент</title>

    <!-- Бібліотека Gemini API -->
    <script src="https://unpkg.com/@google/genai"></script>
    
    <!-- Бібліотека для рендерингу Markdown (для структурованих відповідей) -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/lib/marked.umd.min.js"></script>
    
    <!-- Tailwind CSS CDN (це все, що потрібно для стилів) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Використовуємо шрифт Nunito -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Іконки Material Icons Outlined -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    
    <style>
        /* ОСНОВНІ СТИЛІ ТА АДАПТИВНІСТЬ */
        body {
            background-color: #F7F7F7; 
            color: #1F2937; 
            font-family: 'Nunito', sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            min-height: 100vh;
            padding: 2rem 0; 
            margin: 0;
        }

        .container {
            display: flex;
            max-width: 1200px;
            width: 95%; 
            min-height: 90vh; 
            background-color: #FFFFFF; 
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.15); /* Покращена тінь */
            border-radius: 1.5rem; /* Більше заокруглення */
            overflow: hidden; 
        }
        
        .left-panel {
            flex: 1; 
            padding: 2.5rem; 
            display: flex;
            flex-direction: column;
            justify-content: space-between; 
            overflow-y: hidden; /* Основная прокрутка внутри response-area */
        }
        
        /* Поле для відповіді - забезпечує прокрутку */
        #copilot-response-area {
             flex-grow: 1; 
             overflow-y: auto; 
             /* Мінімальна висота, щоб було видно контент одразу */
             min-height: 200px;
             /* Динамически рассчитываем высоту для лучшей адаптивности */
             max-height: calc(90vh - 180px); 
        }
        
        /* СТИЛІ ДЛЯ MARKDOWN - забезпечують гарний вигляд відповіді */
        #copilot-response-area p, 
        #copilot-response-area ul, 
        #copilot-response-area ol, 
        #copilot-response-area h2,
        #copilot-response-area h3 {
            margin-bottom: 1rem;
        }

        #copilot-response-area ul, #copilot-response-area ol {
            padding-left: 1.5rem;
        }
        
        #copilot-response-area li {
            margin-bottom: 0.5rem;
        }

        #copilot-response-area pre {
            background-color: #E5E7EB; /* Світло-сірий фон для коду */
            padding: 0.75rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            font-family: monospace;
            margin-bottom: 1rem;
        }

        /* ПРАВА ПАНЕЛЬ */
        .right-panel {
            width: 350px; 
            background: linear-gradient(135deg, #E0F2F7 0%, #D1E8F7 100%); /* Градієнтний фон */
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            justify-content: center;
            border-left: 1px solid #C0DFF2;
        }

        .right-panel img {
            width: 100%;
            max-width: 200px; 
            height: auto;
            margin-bottom: 2rem;
            border-radius: 50%; /* Кругле зображення */
            box-shadow: 0 8px 15px -5px rgba(0, 0, 0, 0.2);
            border: 5px solid white; 
        }

        .assistant-info h1 {
            color: #1E40AF; /* Темно-синій */
            font-weight: 800;
        }
        .assistant-info p {
            color: #4B5563;
        }

        /* КНОПКИ ТА ЕЛЕМЕНТИ ФОРМИ */
        .input-area {
            display: flex;
            align-items: flex-end; 
            background-color: #FFFFFF; 
            border: 1px solid #D1D5DB;
            border-radius: 1rem;
            padding: 0.75rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        #user-prompt-input {
            flex: 1;
            padding: 0.25rem 0.5rem;
            background-color: transparent;
            border: none;
            outline: none;
            resize: none; 
            min-height: 30px;
            max-height: 150px; 
            font-size: 1rem;
            line-height: 1.5;
        }
        
        .send-button {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 0.5rem;
            width: 40px;
            height: 40px;
            background-color: #3B82F6; 
            color: white;
            border-radius: 50%;
            transition: background-color 0.2s, opacity 0.2s, transform 0.1s;
        }

        .send-button:hover:not(:disabled) {
            background-color: #2563EB;
            transform: scale(1.05);
        }

        .send-button:disabled {
            background-color: #93C5FD; 
            cursor: not-allowed;
        }

        /* АДАПТИВНІСТЬ */
        @media (max-width: 768px) {
            body {
                padding: 1rem 0;
            }
            .container {
                flex-direction: column; 
                min-height: auto;
                width: 98%; 
                border-radius: 0.5rem;
            }
            .left-panel {
                padding: 1.5rem;
                order: 2; 
                min-height: 50vh;
            }
            .right-panel {
                width: 100%; 
                padding: 1.5rem;
                border-bottom: 1px solid #E5E7EB;
                border-left: none;
                order: 1; 
            }
            .right-panel img {
                max-width: 100px; 
                margin-bottom: 1rem;
            }
            #copilot-response-area {
                /* На мобільних устройствах высота должна быть ограничена */
                max-height: 40vh; 
            }
        }
    </style>
</head>
<body>
    
    <div class="container">
        
        <!-- ЛІВА ПАНЕЛЬ: Ввід та Відповідь -->
        <div class="left-panel">
            
            <div class="top-section flex flex-col h-full">
                <h1 class="text-3xl font-extrabold mb-6 text-gray-800">AI Асистент</h1>
                
                <!-- ОБЛАСТЬ ВІДПОВІДІ (прокручувана) -->
                <div id="copilot-response-area" class="p-4 rounded-xl bg-gray-50 border border-gray-200 shadow-inner text-gray-700 mb-4 h-full">
                    <div class="flex items-center text-blue-600 font-semibold">
                        <span class="material-icons-outlined mr-2">school</span>
                        Привіт! Я AI Освітній Асистент. Чим можу допомогти тобі у навчанні сьогодні?
                    </div>
                </div>
            </div>

            <!-- ОБЛАСТЬ ВВОДУ З КОНТРОЛЯМИ -->
            <div class="bottom-section pt-4">
                <div class="input-area">
                    <textarea 
                        id="user-prompt-input" 
                        placeholder="Введіть ваше питання або завдання (наприклад: 'Поясни закон Ома')" 
                        rows="1"
                        oninput="this.style.height='auto'; this.style.height=(this.scrollHeight)+'px'; checkInput();"></textarea>
                    
                    <!-- Кнопка Надіслати -->
                    <button id="send-copilot-btn" class="send-button focus:outline-none" disabled title="Надіслати запит">
                        <span class="material-icons-outlined text-xl">send</span>
                    </button>
                </div>
            </div>

        </div>

        <!-- ПРАВА ПАНЕЛЬ: Інфо Асистента -->
        <div class="right-panel">
            <!-- Зображення AI Асистента -->
            <img src="assets/assistant.png" onerror="this.onerror=null;this.src='https://placehold.co/200x200/5B84B1/FFFFFF?text=AI+Assistant'" alt="AI Assistant"> 
            <div class="assistant-info">
                <h1 class="text-2xl font-extrabold mb-1">AI Освітній Асистент</h1>
                <p class="text-base font-semibold">Ваш персональний помічник у навчанні</p>
            </div>
        </div>
    </div>
    
    <script type="module">
        // ** ШАГ 1.1: УСТРАНЕНИЕ ОШИБКИ ИМПОРТА **: 
        // Конфигурационные переменные теперь определены непосредственно здесь.
        
        // ** ВАЖНО **: Вам необходимо вставить свой ключ API для работы AI Assistant.
        const API_KEY = "AIzaSyCy0oVEmVk4vp3c5BiVonQeDwTJdWuVLBs"; // <-- ВСТАВЬТЕ ВАШ КЛЮЧ API ЗДЕСЬ

        // Выбор модели Gemini
        const MODEL_NAME = "gemini-2.5-flash-preview-09-2025"; 
        
        // Системная инструкция для модели
        const SYSTEM_INSTRUCTION = "Ви висококваліфікований освітній асистент. Ваші відповіді повинні бути чіткими, структурованими та інформативними, орієнтованими на учнів середньої школи та студентів. Використовуйте українську мову. Форматуйте відповіді за допомогою Markdown.";

        // Инициализация переменных
        let client;
        const responseArea = document.getElementById('copilot-response-area');
        const promptInput = document.getElementById('user-prompt-input');
        const sendButton = document.getElementById('send-copilot-btn');

        // Функция для проверки состояния поля ввода
        window.checkInput = function() {
            // Кнопка активна, если есть текст и клиент инициализирован
            sendButton.disabled = promptInput.value.trim() === '' || !client;
        }

        // Инициализация после загрузки DOM
        document.addEventListener('DOMContentLoaded', () => {
            // ** ШАГ 1.2: ПРОВЕРКА API-КЛЮЧА **: 
            if (!API_KEY || API_KEY.trim() === "") {
                responseArea.innerHTML = 
                    "<div class='my-4 p-4 bg-red-100 border border-red-300 rounded-lg text-red-700 font-bold'>" +
                    "ПОМИЛКА КОНФІГУРАЦІЇ: Будь ласка, вставте ваш ключ API у рядок 262. " +
                    "Доки ключ не буде додано, функціонал AI буде недоступний." +
                    "</div>";
                promptInput.disabled = true;
                sendButton.disabled = true;
                console.error("API Key is missing! Please insert your key in the index.html file.");
                return; // Выход, если ключ не установлен
            }
            
            try {
                // Инициализация клиента Gemini
                client = new GoogleGenAI({ apiKey: API_KEY });
                window.checkInput();
                
            } catch (error) {
                console.error("Помилка ініціалізації GoogleGenAI:", error);
                responseArea.innerHTML = 
                    "<div class='text-red-500'>Помилка: Не вдалося ініціалізувати AI клієнт.</div>";
            }

            // Обработчики событий
            sendButton.addEventListener('click', sendPrompt);
            promptInput.addEventListener('keypress', (e) => {
                // Отправка по Enter, но не по Shift+Enter
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault(); 
                    sendPrompt();
                }
            });
        });

        // Основная функция для отправки запроса к Gemini
        async function sendPrompt() {
            const userPrompt = promptInput.value.trim();

            if (!userPrompt || !client) {
                return;
            }

            // UI: Блокировка и очистка
            sendButton.disabled = true;
            promptInput.disabled = true;
            
            const currentPrompt = userPrompt;
            
            promptInput.value = '';
            promptInput.style.height = '30px'; // Сброс высоты
            window.checkInput(); 

            // Добавление запроса пользователя
            responseArea.innerHTML += `
                <div class="my-4 p-3 bg-blue-50 border border-blue-200 rounded-lg text-sm font-medium text-gray-800 shadow-sm">
                    <span class="material-icons-outlined text-base align-middle mr-1">person</span> 
                    **Ваш запит:** ${currentPrompt}
                </div>`;
            
            // ** ШАГ 2.1: ИНДИКАТОР ЗАГРУЗКИ **: 
            const loadingHtml = `
                <div id="loading-indicator" class="flex items-center text-gray-500 my-4 p-3 bg-gray-100 rounded-lg">
                    <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span class="font-medium text-blue-600">AI Асистент генерує відповідь...</span>
                </div>`;
            responseArea.innerHTML += loadingHtml;
            responseArea.scrollTop = responseArea.scrollHeight; 

            try {
                const request = {
                    contents: [{ role: "user", parts: [{ text: userPrompt }] }],
                    config: {
                        systemInstruction: SYSTEM_INSTRUCTION,
                        tools: [{ googleSearch: {} }] 
                    }
                };
                
                // Вызов API
                const response = await client.models.generateContent({
                    model: MODEL_NAME,
                    ...request
                });

                let generatedText = response.text || "Не вдалося отримати відповідь від моделі.";
                
                // Удаление индикатора загрузки
                const loadingIndicator = document.getElementById('loading-indicator');
                if (loadingIndicator) loadingIndicator.remove();
                
                // Рендеринг Markdown
                const renderedHtml = marked.parse(generatedText);
                
                let finalResponseHtml = `
                    <div class="my-4 p-4 bg-white border border-gray-200 rounded-xl shadow-lg">
                        <div class="flex items-center mb-3 font-bold text-gray-700">
                            <span class="material-icons-outlined mr-2 text-blue-500">auto_fix_high</span>
                            Відповідь Асистента:
                        </div>
                        ${renderedHtml}
                    </div>`;

                // Добавление ссылок на источники
                const groundingMetadata = response.candidates?.[0]?.groundingMetadata;
                if (groundingMetadata && groundingMetadata.groundingAttributions && groundingMetadata.groundingAttributions.length > 0) {
                    let sourcesHtml = '<div class="mt-4 pt-2 border-t border-gray-100 text-xs text-gray-500">';
                    
                    const uniqueUris = new Set();
                    groundingMetadata.groundingAttributions.forEach((attr) => {
                        if (attr.web && attr.web.uri && attr.web.title && !uniqueUris.has(attr.web.uri)) {
                            uniqueUris.add(attr.web.uri);
                            sourcesHtml += `<br> ${uniqueUris.size}. <a href="${attr.web.uri}" target="_blank" class="text-blue-500 hover:underline">${attr.web.title}</a>`;
                        }
                    });
                    sourcesHtml += '</div>';
                    if (uniqueUris.size > 0) {
                        finalResponseHtml = finalResponseHtml.slice(0, -6) + sourcesHtml + finalResponseHtml.slice(-6); 
                    }
                }
                
                responseArea.innerHTML += finalResponseHtml;

            } catch (error) {
                console.error("Помилка при виклику Gemini API:", error);
                
                const loadingIndicator = document.getElementById('loading-indicator');
                if (loadingIndicator) loadingIndicator.remove();
                
                responseArea.innerHTML += `<div class='my-4 p-4 bg-red-100 border border-red-300 rounded-lg text-red-700'>На жаль, сталася помилка при генерації відповіді. Спробуйте ще раз.</div>`;
            } finally {
                // UI: Восстановление
                sendButton.disabled = false;
                promptInput.disabled = false;
                promptInput.focus();
                responseArea.scrollTop = responseArea.scrollHeight; 
            }
        }
        
    </script>
</body>
</html>
