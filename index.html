<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Освітній Асистент</title>
    <!-- Загрузка Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Загрузка шрифта Nunito -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Применение шрифта Nunito ко всему документу */
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f3f4f6;
        }
        /* Стиль для кнопки с градиентом */
        .btn-primary {
            background-image: linear-gradient(to right, #4f46e5 0%, #a855f7 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            opacity: 0.9;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
        }
        /* Стиль для индикатора прогресса */
        .progress-bar {
            height: 10px;
            background-color: #e5e7eb;
            border-radius: 9999px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background-image: linear-gradient(to right, #10b981, #3b82f6);
            transition: width 0.5s ease;
        }
    </style>
</head>
<body>

<div class="min-h-screen flex flex-col lg:flex-row">

    <!-- Левая панель - Фото Ассистента (растянуто от самого верха) -->
    <div class="lg:w-1/3 bg-gray-900 flex flex-col justify-center items-center p-8 relative overflow-hidden text-white"
         style="min-height: 250px; /* Минимальная высота для мобильных */">
        
        <!--
            ВАШЕ ИЗОБРАЖЕНИЕ АССИСТЕНТА, ИСПОЛЬЗУЯ RAW-ССЫЛКУ С GITHUB.
        -->
        <img id="assistant-photo"
             src="https://raw.githubusercontent.com/EvaSunCatches/AI-Assistant/main/assets/assistant.png"
             alt="AI Асистент" 
             class="absolute inset-0 w-full h-full object-cover opacity-70" 
             onerror="this.style.display='none'; this.closest('div').style.backgroundImage='linear-gradient(to bottom, #1f2937, #374151)'">

        <!-- Заголовок поверх фото -->
        <div class="relative z-10 text-center p-4 rounded-xl backdrop-blur-sm bg-black bg-opacity-30">
            <h1 class="text-3xl font-bold mb-2">AI Освітній Асистент</h1>
            <p class="text-lg text-gray-200">Ваш персональний помічник у навчанні</p>
        </div>
    </div>

    <!-- Правая панель - Форма ввода задания -->
    <div class="lg:w-2/3 p-4 md:p-10 flex flex-col justify-center">
        <div class="max-w-xl mx-auto w-full bg-white p-6 md:p-8 rounded-2xl shadow-2xl">
            <h2 class="text-2xl font-extrabold text-gray-800 mb-6">Введіть ваше завдання</h2>

            <!-- Выбор предмета (Drop Down) -->
            <div class="mb-5">
                <label for="subject-select" class="block text-sm font-medium text-gray-700 mb-2">
                    Правильно вибрати предмет
                </label>
                <select id="subject-select" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 transition duration-150 ease-in-out shadow-sm">
                    <option value="" disabled selected>Виберіть предмет...</option>
                    <option value="Математика">Математика</option>
                    <option value="Українська мова">Українська мова</option>
                    <option value="Українська література">Українська література</option>
                    <option value="Історія України">Історія України</option>
                </select>
            </div>

            <!-- Раздел 1: Выбор типа ввода (URL/Фото) -->
            <div class="mb-5">
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Розділ 1: Джерело завдання
                </label>
                <div class="flex space-x-4">
                    <button id="input-type-url" type="button" 
                            class="flex-1 p-3 rounded-lg font-semibold transition duration-150 ease-in-out border-2 border-indigo-500 bg-indigo-50 text-indigo-700">
                        По посиланню (URL)
                    </button>
                    <button id="input-type-photo" type="button" 
                            class="flex-1 p-3 rounded-lg font-semibold transition duration-150 ease-in-out border-2 border-gray-300 text-gray-700 hover:bg-gray-50">
                        Завантажити фото
                    </button>
                </div>
            </div>
            
            <!-- Динамический блок полей: URL (По умолчанию) -->
            <div id="url-fields" class="space-y-4 mb-5">
                <div class="flex flex-col md:flex-row md:space-x-4 space-y-4 md:space-y-0">
                    <div class="flex-1">
                        <label for="task-url" class="block text-sm font-medium text-gray-700 mb-1">URL (Посилання)</label>
                        <input type="url" id="task-url" placeholder="https://pidruchnik.ua/..."
                               class="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
                    </div>
                    <div>
                        <label for="task-section" class="block text-sm font-medium text-gray-700 mb-1">Розділ</label>
                        <input type="text" id="task-section" placeholder="Напр. 1"
                               class="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
                    </div>
                </div>
                <div class="flex space-x-4">
                    <div class="flex-1">
                        <label for="task-page" class="block text-sm font-medium text-gray-700 mb-1">Сторінка</label>
                        <input type="number" id="task-page" placeholder="Напр. 54"
                               class="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
                    </div>
                    <div class="flex-1">
                        <label for="task-number" class="block text-sm font-medium text-gray-700 mb-1">Номер завдання</label>
                        <input type="text" id="task-number" placeholder="Напр. 54 або §3"
                               class="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
                    </div>
                </div>
            </div>

            <!-- Динамический блок полей: Фото (Скрыт по умолчанию) -->
            <div id="photo-fields" class="space-y-4 mb-5 hidden">
                <div class="flex space-x-4">
                    <button type="button" onclick="document.getElementById('photo-upload-input').click()"
                            class="flex-1 p-3 rounded-lg font-semibold text-white bg-green-500 hover:bg-green-600 transition duration-150 ease-in-out shadow-md flex items-center justify-center">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        Browse (Вибрати файл)
                    </button>
                    <!-- Единый input для файлов, который будет триггериться обеими кнопками -->
                    <input type="file" id="photo-upload-input" accept="image/*" class="hidden">
                    
                    <button type="button" onclick="document.getElementById('photo-camera-input').click()"
                            class="flex-1 p-3 rounded-lg font-semibold text-white bg-blue-500 hover:bg-blue-600 transition duration-150 ease-in-out shadow-md flex items-center justify-center">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.218A2 2 0 0110.69 4h2.62a2 2 0 011.664.89l.812 1.218a2 2 0 001.664.89H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        Зробити фото
                    </button>
                    <!-- Input для камеры -->
                    <input type="file" id="photo-camera-input" accept="image/*" capture="camera" class="hidden">
                </div>
                <div id="photo-status" class="text-sm text-gray-500 text-center">Фото не вибрано.</div>
            </div>

            <!-- Секция: Укажите, что необходимо сделать -->
            <div class="mb-6">
                <label for="task-description" class="block text-sm font-medium text-gray-700 mb-2">
                    Секція: Укажіть, що необхідно зробити
                </label>
                <textarea id="task-description" rows="4" placeholder="Наприклад: 'Допоможи мені зрозуміти, як розв'язати це завдання, та поясни правило, яке використовується.'"
                          class="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-indigo-500 focus:border-indigo-500 resize-none"></textarea>
            </div>

            <!-- Кнопка "Получить помощь ассистента" -->
            <button id="get-help-button" type="button"
                    class="btn-primary w-full py-3 rounded-lg text-lg font-bold text-white shadow-lg flex items-center justify-center">
                Отримати допомогу асистента
            </button>
            
            <!-- Индикатор прогресса (Скрыт по умолчанию) -->
            <div id="progress-container" class="mt-6 hidden">
                <p class="text-sm font-medium text-gray-700 mb-2">Очікування відповіді асистента:</p>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
                </div>
                <p id="progress-text" class="text-center mt-2 text-indigo-600 font-bold">0% виконано</p>
            </div>
            
            <!-- Сообщение о результате (Скрыто по умолчанию) -->
            <div id="result-message" class="mt-6 p-4 bg-green-100 border border-green-400 text-green-700 rounded-lg hidden">
                <p class="font-semibold">Готово!</p>
                <p>Ваше завдання виконано, асистент надає рішення та пояснення. (Тут буде відповідь)</p>
            </div>

        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const urlButton = document.getElementById('input-type-url');
        const photoButton = document.getElementById('input-type-photo');
        const urlFields = document.getElementById('url-fields');
        const photoFields = document.getElementById('photo-fields');
        const getHelpButton = document.getElementById('get-help-button');
        const progressContainer = document.getElementById('progress-container');
        const progressFill = document.getElementById('progress-fill');
        const progressText = document.getElementById('progress-text');
        const resultMessage = document.getElementById('result-message');
        const photoUploadInput = document.getElementById('photo-upload-input');
        const photoCameraInput = document.getElementById('photo-camera-input');
        const photoStatus = document.getElementById('photo-status');
        
        let selectedInputType = 'url'; // Начальное значение

        // 1. Логика переключения между URL и Фото
        const toggleInputType = (type) => {
            selectedInputType = type;
            if (type === 'url') {
                urlFields.classList.remove('hidden');
                photoFields.classList.add('hidden');
                urlButton.classList.add('bg-indigo-50', 'text-indigo-700', 'border-indigo-500');
                urlButton.classList.remove('bg-white', 'text-gray-700', 'border-gray-300', 'hover:bg-gray-50');
                photoButton.classList.add('bg-white', 'text-gray-700', 'border-gray-300', 'hover:bg-gray-50');
                photoButton.classList.remove('bg-indigo-50', 'text-indigo-700', 'border-indigo-500');
            } else {
                urlFields.classList.add('hidden');
                photoFields.classList.remove('hidden');
                photoButton.classList.add('bg-indigo-50', 'text-indigo-700', 'border-indigo-500');
                photoButton.classList.remove('bg-white', 'text-gray-700', 'border-gray-300', 'hover:bg-gray-50');
                urlButton.classList.add('bg-white', 'text-gray-700', 'border-gray-300', 'hover:bg-gray-50');
                urlButton.classList.remove('bg-indigo-50', 'text-indigo-700', 'border-indigo-500');
            }
        };

        urlButton.addEventListener('click', () => toggleInputType('url'));
        photoButton.addEventListener('click', () => toggleInputType('photo'));
        
        // 2. Логика обработки загрузки фото
        const updatePhotoStatus = (input) => {
            // Используем общий input для загрузки (Browse)
            if (input.files && input.files.length > 0) {
                photoStatus.textContent = `Вибрано файл: ${input.files[0].name}`;
                photoStatus.classList.remove('text-gray-500');
                photoStatus.classList.add('text-green-600', 'font-semibold');
            } else {
                photoStatus.textContent = 'Фото не вибрано.';
                photoStatus.classList.add('text-gray-500');
                photoStatus.classList.remove('text-green-600', 'font-semibold');
            }
        };

        // Обрабатываем изменения в обоих полях (Browse и Камера)
        photoUploadInput.addEventListener('change', (e) => updatePhotoStatus(e.target));
        photoCameraInput.addEventListener('change', (e) => updatePhotoStatus(e.target));


        // 3. Логика симуляции прогресса (для демонстрации)
        getHelpButton.addEventListener('click', () => {
            // Сброс и скрытие предыдущих состояний
            progressContainer.classList.add('hidden');
            resultMessage.classList.add('hidden');
            progressFill.style.width = '0%';
            progressText.textContent = '0% виконано';
            getHelpButton.disabled = true;
            getHelpButton.textContent = 'Обробка...';

            // Показываем индикатор прогресса
            progressContainer.classList.remove('hidden');

            let progress = 0;
            const totalDuration = 5000; // Общая длительность симуляции (5 секунд)
            const startTime = Date.now();
            
            const updateProgress = () => {
                const elapsed = Date.now() - startTime;
                
                // Прогресс по времени, но с замедлением в конце
                let normalizedProgress = Math.min(1, elapsed / totalDuration);
                
                // Используем нелинейную функцию для более реалистичного ощущения (например, квадратный корень)
                progress = Math.floor(Math.sqrt(normalizedProgress) * 100);
                
                if (progress >= 100) {
                    progress = 100;
                    progressFill.style.width = '100%';
                    progressText.textContent = '100% виконано. Завдання готове!';
                    
                    // Показываем сообщение о результате
                    setTimeout(() => {
                        progressContainer.classList.add('hidden');
                        resultMessage.classList.remove('hidden');
                        getHelpButton.disabled = false;
                        getHelpButton.textContent = 'Отримати допомогу асистента';
                    }, 500); // Подождать немного перед показом результата
                    
                    return;
                }

                const remainingTime = Math.ceil((totalDuration - elapsed) / 1000);
                
                progressFill.style.width = `${progress}%`;
                progressText.textContent = `${progress}% виконано. Залишилось чекати: ~${remainingTime} сек.`;

                requestAnimationFrame(updateProgress);
            };

            requestAnimationFrame(updateProgress);
        });
    });
</script>

</body>
</html>
