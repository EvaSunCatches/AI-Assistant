<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Освітній Асистент</title>
    <!-- Загрузка Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Загрузка шрифта Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Применение шрифта Inter ко всему документу */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f4f8; /* Очень светлый фон страницы */
        }
        
        /* СТИЛЬ КНОПОК: СИНЕ-ГОЛУБОЙ ТОН */
        .btn-primary {
            background-color: #4c51bf; /* primary-blue */
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(76, 81, 191, 0.3);
        }
        .btn-primary:hover {
            background-color: #5a62c6;
            transform: translateY(-1px);
        }

        /* Стили для видео и холста */
        #video, #photoCanvas, #capturedImage {
            width: 100%;
            height: auto;
            max-height: 300px;
            object-fit: cover;
            border-radius: 8px;
            margin-top: 10px;
            display: none; /* Скрыты по умолчанию */
            background-color: #1e293b; /* Темный фон для видео/холста */
        }
        #video.active, #capturedImage.active {
            display: block;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<!-- Основной контейнер, СТАЛ БОЛЕЕ ПРОЗРАЧНЫМ И СВЕТЛЫМ (bg-white/70) -->
<div class="w-full max-w-lg mx-auto bg-white/70 backdrop-blur-lg shadow-2xl rounded-xl p-6 md:p-8 border border-gray-100 transition-all duration-300">
    
    <!-- Заголовок -->
    <h1 class="text-3xl font-extrabold text-gray-900 text-center mb-2">AI Освітній Асистент 5-й Клас</h1>
    <p class="text-center text-gray-500 mb-6">Ваш персональний помічник у навчанні</p>

    <!-- Поле для ввода задания -->
    <div class="mb-5">
        <label for="taskInput" class="block text-sm font-medium text-gray-700 mb-2">Введіть ваше завдання</label>
        <textarea id="taskInput" rows="3" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-primary-blue focus:border-primary-blue transition duration-150 ease-in-out resize-none shadow-sm" placeholder="Наприклад: Розв'яжи задачу 55 на сторінці 120"></textarea>
    </div>

    <!-- Выпадающий список "Выбрать предмет" -->
    <div class="mb-5">
        <label for="subjectSelect" class="block text-sm font-medium text-gray-700 mb-2">Вибрати предмет</label>
        <select id="subjectSelect" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-primary-blue focus:border-primary-blue appearance-none transition duration-150 ease-in-out shadow-sm bg-white">
            <option value="">-- Виберіть предмет --</option>
            <option value="math">Математика</option>
            <option value="ukr">Українська мова</option>
            <option value="history">Історія</option>
            <option value="other">Інше</option>
        </select>
    </div>
    
    <!-- Загрузка/Фото -->
    <div class="mb-6 space-y-4 p-4 border border-blue-100 bg-blue-50 rounded-lg">
        <h3 class="text-lg font-semibold text-gray-700 mb-3">Завантажити матеріали:</h3>

        <!-- 1. Загрузка файла -->
        <div class="flex items-center space-x-3">
            <input type="file" id="fileUpload" accept="image/*, application/pdf" class="hidden" onchange="displayFileName()">
            <button type="button" onclick="document.getElementById('fileUpload').click()" class="flex-shrink-0 w-1/2 md:w-auto px-4 py-2 bg-green-500 text-white font-semibold rounded-lg shadow-md hover:bg-green-600 transition duration-150 ease-in-out">
                Завантажити файл
            </button>
            <span id="fileNameDisplay" class="text-sm text-gray-600 truncate">Файл не вибраний</span>
        </div>
        
        <div class="text-center text-sm text-gray-500 my-2">-- АБО --</div>

        <!-- 2. Запуск Камеры (ВОССТАНОВЛЕН ПРЕДЫДУЩИЙ ФУНКЦИОНАЛ) -->
        <div class="space-y-3">
            <button id="startCameraButton" class="w-full px-4 py-2 bg-indigo-500 text-white font-semibold rounded-lg shadow-md hover:bg-indigo-600 transition duration-150 ease-in-out">
                Запустити камеру
            </button>
            
            <div id="camera-controls" class="hidden space-y-3">
                <video id="video" autoplay playsinline class="active"></video>
                <canvas id="photoCanvas" class="hidden"></canvas>
                <img id="capturedImage" alt="Зроблене фото" class="hidden rounded-lg shadow-lg">

                <button id="takePhotoButton" disabled class="w-full px-4 py-2 bg-red-500 text-white font-semibold rounded-lg shadow-md disabled:opacity-50 hover:bg-red-600 transition duration-150 ease-in-out">
                    Зробити фото
                </button>
                <button id="retakePhotoButton" class="w-full px-4 py-2 bg-yellow-500 text-white font-semibold rounded-lg shadow-md hidden hover:bg-yellow-600 transition duration-150 ease-in-out">
                    Перезняти / Сховати камеру
                </button>
            </div>
        </div>
    </div>

    <!-- Кнопка Получить помощь -->
    <button id="getHelpButton" class="btn-primary w-full px-6 py-3 text-white text-lg font-bold rounded-lg shadow-xl focus:outline-none focus:ring-4 focus:ring-primary-blue focus:ring-opacity-50 transition duration-300 ease-in-out transform hover:scale-[1.01]">
        Отримати допомогу асистента
    </button>

    <!-- Блок для вывода результата -->
    <div id="solutionOutput" class="mt-8 p-4 bg-gray-100 border border-gray-300 rounded-lg hidden">
        <h3 class="text-xl font-bold text-gray-800 mb-3">Розв'язання та пояснення</h3>
        <div id="resultText" class="text-gray-700 whitespace-pre-wrap"></div>
    </div>
    
    <!-- Сообщение об ошибке/уведомление -->
    <div id="messageBox" class="mt-4 p-3 text-sm rounded-lg text-center hidden"></div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('photoCanvas');
    const capturedImage = document.getElementById('capturedImage');
    const startCameraButton = document.getElementById('startCameraButton');
    const takePhotoButton = document.getElementById('takePhotoButton');
    const retakePhotoButton = document.getElementById('retakePhotoButton');
    const cameraControls = document.getElementById('camera-controls');
    const messageBox = document.getElementById('messageBox');
    let mediaStream = null;

    // --- Утилиты UI ---
    function showMessage(text, isError = false) {
        messageBox.textContent = text;
        messageBox.className = `mt-4 p-3 text-sm rounded-lg text-center ${isError ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`;
        messageBox.classList.remove('hidden');
    }

    function displayFileName() {
        const fileInput = document.getElementById('fileUpload');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        if (fileInput.files.length > 0) {
            fileNameDisplay.textContent = `Вибраний файл: ${fileInput.files[0].name}`;
        } else {
            fileNameDisplay.textContent = 'Файл не вибраний';
        }
    }
    
    // --- Логика Камеры (ВОССТАНОВЛЕНА) ---
    
    function hideCamera() {
        if (mediaStream) {
            mediaStream.getTracks().forEach(track => track.stop());
            mediaStream = null;
        }
        video.srcObject = null;
        video.classList.remove('active');
        capturedImage.classList.remove('active');
        capturedImage.src = '';
        cameraControls.classList.add('hidden');
        takePhotoButton.disabled = true;
        
        // Управление видимостью кнопок
        retakePhotoButton.classList.add('hidden');
        startCameraButton.classList.remove('hidden');
        takePhotoButton.classList.remove('hidden'); // Убедиться, что она видна при следующем запуске
    }

    async function startCamera() {
        if (mediaStream) return; // Не запускать, если уже запущено

        try {
            // Запрашиваем доступ к камере
            mediaStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
            
            // Отображаем видео
            video.srcObject = mediaStream;
            video.classList.add('active');
            capturedImage.classList.remove('active');
            cameraControls.classList.remove('hidden');
            startCameraButton.classList.add('hidden');
            retakePhotoButton.classList.add('hidden'); // Скрыта при запуске
            takePhotoButton.classList.remove('hidden'); // Видна при запуске

            video.onloadedmetadata = () => {
                video.play();
                takePhotoButton.disabled = false;
                showMessage('Камера активна. Можна робити фото.', false);
            };
            
        } catch (err) {
            console.error("Ошибка доступа к камере: ", err);
            showMessage(`Помилка: Не вдалося отримати доступ до камери. ${err.name}`, true);
            hideCamera(); // Скрываем элементы камеры при ошибке
        }
    }

    function takePhoto() {
        if (!mediaStream) return;

        // Устанавливаем размеры холста
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        // Рисуем текущий кадр с видео на холст
        const context = canvas.getContext('2d');
        context.drawImage(video, 0, 0, canvas.width, canvas.height);

        // Получаем изображение в формате base64
        const dataUrl = canvas.toDataURL('image/png');

        // Отображаем полученное фото и скрываем видео
        capturedImage.src = dataUrl;
        capturedImage.classList.add('active');
        video.classList.remove('active');
        
        // Останавливаем поток камеры
        mediaStream.getTracks().forEach(track => track.stop());
        mediaStream = null;

        takePhotoButton.disabled = true;
        takePhotoButton.classList.add('hidden'); // Скрываем "Сделать фото"
        retakePhotoButton.classList.remove('hidden'); // Показываем "Переснять"
        showMessage('Фото зроблено! Натисніть "Перезняти", щоб почати знову або сховати камеру.', false);
        
        console.log("Фотографія захоплена (base64 dataURL):", dataUrl.substring(0, 50) + "...");
    }

    // --- Обработчики событий ---
    startCameraButton.addEventListener('click', startCamera);
    takePhotoButton.addEventListener('click', takePhoto);
    retakePhotoButton.addEventListener('click', () => {
        // Если отображено фото, скрываем камеру (и все кнопки)
        if (capturedImage.classList.contains('active')) {
            hideCamera();
            showMessage('Камера прихована.', false);
        } else {
            // Если отображается видео, скрываем камеру
            hideCamera(); 
        }
        
        // В обоих случаях, после hideCamera(), startCameraButton снова видна
    });

    // Демонстрационная функция для кнопки "Получить помощь"
    document.getElementById('getHelpButton').addEventListener('click', () => {
        document.getElementById('resultText').textContent = 'Це демонстраційна відповідь. У робочому додатку тут буде рішення вашого завдання від AI асистента, враховуючи введений текст, вибраний предмет та завантажене/зроблене фото.';
        document.getElementById('solutionOutput').classList.remove('hidden');
        showMessage('Запит надіслано. Результат виведено.', false);
    });
</script>

</body>
</html>
