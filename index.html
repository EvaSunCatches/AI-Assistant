<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Освітній Асистент 5-й Клас</title>

    <!-- Загрузка Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Загрузка шрифта Nunito -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* Убедимся, что тело занимает всю высоту viewport */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
            background-color: #f3f4f6;
            overflow: hidden; /* Основной контейнер контролирует прокрутку */
        }

        /* Контейнер для двух колонок, занимающий всю высоту */
        #main-layout {
            display: flex;
            min-height: 100vh;
        }

        /* Левая колонка - рабочая область (форма + результат) */
        #app-content {
            flex-grow: 1; /* Занимает доступное пространство */
            max-width: 100%; /* По умолчанию на мобильных */
            overflow-y: auto; /* Включает прокрутку для контента формы/результата */
            padding: 1.5rem;
        }

        /* Правая колонка - изображение ассистента */
        #assistant-visual {
            display: none; /* Скрываем по умолчанию на мобильных */
            position: relative;
            flex-shrink: 0;
            width: 40%; /* 40% ширины экрана */
            max-width: 600px; /* Ограничиваем максимальную ширину */
            overflow: hidden;
            background-color: #e0f2fe; /* Светло-голубой фон как заглушка */
        }

        @media (min-width: 1024px) { /* Начинаем отображать на десктопах (lg) */
            #app-content {
                max-width: 60%; /* Принудительно ограничиваем левую панель */
                padding: 2.5rem;
            }
            #assistant-visual {
                display: block;
                width: 40%;
            }
        }
        
        /* Стиль кнопок */
        .btn-primary {
            background: linear-gradient(145deg, #e0f7fa, #b3e5fc);
            color: #01579b;
            border: 1px solid #81d4fa;
            box-shadow: 0 4px 6px rgba(0, 150, 255, 0.1), 0 1px 3px rgba(0, 150, 255, 0.08);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background: linear-gradient(145deg, #b3e5fc, #81d4fa);
            box-shadow: 0 6px 10px rgba(0, 150, 255, 0.2), 0 3px 6px rgba(0, 150, 255, 0.1);
            transform: translateY(-1px);
        }

        /* Анимация пульсации для имитации активности AI */
        @keyframes pulse-opacity-interactive {
            0%, 100% { opacity: 0.9; }
            50% { opacity: 1; }
        }
        .loading-animation {
            animation: pulse-opacity-interactive 1.5s infinite;
        }

        /* Добавляем эффект матового стекла для заголовка */
        .glass-overlay {
            /* Полупрозрачный белый фон */
            background-color: rgba(255, 255, 255, 0.25);
            /* Эффект размытия (Frosted glass) */
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>

    <!-- Основной контейнер макета -->
    <div id="main-layout">

        <!-- ЛЕВАЯ КОЛОНКА: Рабочая область приложения (Форма + Результат) -->
        <div id="app-content" class="bg-white lg:shadow-2xl lg:shadow-blue-100">
            <div class="max-w-xl mx-auto space-y-8">
                
                <header class="mb-6 lg:hidden">
                     <h1 class="text-3xl font-extrabold text-blue-800">AI Освітній Асистент 5-й Клас</h1>
                     <p class="text-gray-500">Ваш персональний помічник у навчанні</p>
                </header>

                <!-- Форма задания -->
                <form id="assistant-form" class="space-y-6">
                    <h2 class="text-2xl font-bold text-gray-800 border-b pb-2">Введення даних</h2>

                    <!-- Ввод задания -->
                    <div>
                        <label for="task-input" class="block text-sm font-medium text-gray-700 mb-1">Введіть ваше завдання</label>
                        <textarea id="task-input" rows="4" class="block w-full rounded-lg border-gray-300 shadow-inner p-3 border focus:border-blue-500 focus:ring-blue-500 transition duration-150" placeholder="Наприклад: Розв'яжи задачу 57 зі сторінки 25 з книги 'Математика 5 клас'"></textarea>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <!-- Выбор предмета -->
                        <div>
                            <label for="subject-select" class="block text-sm font-medium text-gray-700 mb-1">Оберіть предмет</label>
                            <select id="subject-select" class="block w-full rounded-lg border-gray-300 shadow-sm p-3 border focus:border-blue-500 focus:ring-blue-500 transition duration-150 bg-white">
                                <option value="Математика">Математика</option>
                                <option value="Українська мова">Українська мова</option>
                                <option value="Історія">Історія</option>
                                <option value="Біологія">Біологія</option>
                                <option value="Інший">Інший</option>
                            </select>
                        </div>
                        
                        <!-- Ввод ссылки (URL) -->
                        <div>
                            <label for="url-input" class="block text-sm font-medium text-gray-700 mb-1">Контекст (URL книги)</label>
                            <input type="url" id="url-input" class="block w-full rounded-lg border-gray-300 shadow-sm p-3 border focus:border-blue-500 focus:ring-blue-500 transition duration-150" placeholder="https://..." value="">
                        </div>
                    </div>
                    
                    <!-- Загрузка фото (деактивировано) -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Завантажити фото (Функція деактивована)</label>
                        <label for="photo-upload" class="flex justify-center items-center w-full h-12 rounded-lg border-2 border-dashed border-gray-300 bg-gray-50 text-gray-500 cursor-not-allowed">
                            <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                            Обрати файл (Наразі недоступно)
                            <input type="file" id="photo-upload" class="hidden" disabled>
                        </label>
                    </div>

                    <!-- Кнопка вызова ассистента -->
                    <button type="submit" id="submit-button" class="btn-primary w-full py-3 rounded-xl text-lg font-bold shadow-lg">
                        Отримати допомогу асистента
                    </button>
                </form>

                <!-- Блок с результатом -->
                <div id="result-container">
                    <h2 class="text-2xl font-bold text-gray-800 border-b pb-2">Розв'язання та пояснення</h2>
                    
                    <div id="loading-indicator" class="hidden text-center text-blue-500 p-4">
                        <p class="font-semibold loading-animation">AI обмірковує...</p>
                        <div class="mt-2 flex justify-center space-x-2">
                            <div class="w-3 h-3 bg-blue-500 rounded-full animate-bounce"></div>
                            <div class="w-3 h-3 bg-blue-500 rounded-full animate-bounce delay-150"></div>
                            <div class="w-3 h-3 bg-blue-500 rounded-full animate-bounce delay-300"></div>
                        </div>
                    </div>

                    <div id="result-message" class="result-box bg-gray-50 p-4 mt-2 rounded-lg text-gray-800 text-base shadow-inner border">
                        Тут з'явиться відповідь від AI Асистента. Асистент пояснить логіку і кроки розв'язання.
                    </div>
                </div>

            </div>
        </div>
        
        <!-- ПРАВА КОЛОНКА: Визуальное представление ассистента -->
        <div id="assistant-visual">
            <img id="assistant-image"
                src="https://raw.githubusercontent.com/EvaSunCatches/AI-Assistant/main/assets/assistant.png"
                alt="AI Асистент"
                class="w-full h-full object-cover transition-transform duration-500"
                style="object-position: 80% center;"> <!-- Сдвигаем фокус вправо -->

            <!-- Матовое прозрачное наложение с текстом -->
            <div class="glass-overlay absolute right-0 bottom-0 m-4 p-4 rounded-xl text-white max-w-xs sm:max-w-sm lg:max-w-md">
                <h1 class="text-2xl sm:text-3xl font-extrabold drop-shadow-lg" style="text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">AI Освітній Асистент</h1>
                <p class="text-lg sm:text-xl font-medium drop-shadow-md" style="text-shadow: 1px 1px 3px rgba(0,0,0,0.4);">Ваш персональний помічник у навчанні</p>
            </div>
        </div>

    </div>

    <script type="module">
        // --- БОЙЛЕРПЛЕЙТ FIREBASE ТА API ---
        
        // Глобальные переменные Firebase, которые предоставляет Canvas.
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        // API Key для Gemini
        const apiKey = ""; // Canvas предоставит ключ при вызове fetch

        // --- ИМПОРТЫ FIREBASE ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, setLogLevel } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Инициализация Firebase
        let app, db, auth;
        try {
            if (Object.keys(firebaseConfig).length > 0) {
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                setLogLevel('Debug');
                // console.log("Firebase ініціалізовано.");
            }
        } catch (e) {
            console.error("Помилка ініціалізації Firebase:", e);
        }

        // Аутентификация
        async function authenticate() {
            try {
                if (auth) {
                    if (initialAuthToken) {
                        await signInWithCustomToken(auth, initialAuthToken);
                        // console.log("Успішний вхід за допомогою Custom Token.");
                    } else {
                        await signInAnonymously(auth);
                        // console.log("Успішний анонімний вхід.");
                    }
                }
            } catch (error) {
                console.error("Помилка аутентифікації:", error);
            }
        }
        authenticate();

        // --- Вспомогательные функции ---

        // Экспоненциальный откат для API-запросов
        async function fetchWithRetry(url, options, maxRetries = 5) {
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.status === 429 && i < maxRetries - 1) {
                        const delay = Math.pow(2, i) * 1000 + Math.random() * 1000;
                        // console.warn(`Запит обмежено, повторна спроба через ${delay.toFixed(0)} мс...`);
                        await new Promise(resolve => setTimeout(resolve, delay));
                        continue;
                    }
                    if (!response.ok) {
                        throw new Error(`HTTP помилка: ${response.status} ${response.statusText}`);
                    }
                    return response.json();
                } catch (error) {
                    if (i === maxRetries - 1) {
                        throw error;
                    }
                    const delay = Math.pow(2, i) * 1000 + Math.random() * 1000;
                    // console.error(`Помилка запиту (спроба ${i + 1}/${maxRetries}):`, error.message);
                    await new Promise(resolve => setTimeout(resolve, delay));
                }
            }
        }

        // --- Основная логика приложения ---
        const form = document.getElementById('assistant-form');
        const taskInput = document.getElementById('task-input');
        const subjectSelect = document.getElementById('subject-select');
        const urlInput = document.getElementById('url-input');
        const submitButton = document.getElementById('submit-button');
        const loadingIndicator = document.getElementById('loading-indicator');
        const resultMessage = document.getElementById('result-message');
        const assistantImage = document.getElementById('assistant-image');

        form.addEventListener('submit', handleFormSubmit);

        async function handleFormSubmit(event) {
            event.preventDefault();

            const task = taskInput.value.trim();
            const subject = subjectSelect.value;
            const url = urlInput.value.trim();

            if (!task) {
                resultMessage.textContent = "Будь ласка, введіть ваше завдання.";
                resultMessage.classList.remove('bg-gray-50', 'text-gray-800');
                resultMessage.classList.add('bg-red-100', 'text-red-700');
                return;
            }

            // Очистка и установка состояния загрузки
            resultMessage.textContent = "";
            resultMessage.classList.remove('bg-red-100', 'text-red-700');
            resultMessage.classList.add('bg-gray-50', 'text-gray-800');
            loadingIndicator.classList.remove('hidden');
            submitButton.disabled = true;
            assistantImage.classList.add('loading-animation');

            // Формирование запроса для AI
            let userQuery = `Завдання з предмету "${subject}": ${task}.`;
            if (url) {
                userQuery += ` Це завдання стосується матеріалу за посиланням: ${url}.`;
            }

            // Добавляем инструкцию для AI для получения только текста
            const systemPrompt = `Ви — доброзичливий, досвідчений вчитель-асистент для 5-го класу. Ваша мета — допомогти учню зрозуміти, як розв'язувати завдання, а не просто дати відповідь. Пояснюйте логіку, правила та кроки детально і заохочувальним тоном. Відповідь надавайте виключно українською мовою. Форматуйте свою відповідь за допомогою Markdown.`;

            try {
                const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

                const payload = {
                    contents: [{ parts: [{ text: userQuery }] }],
                    tools: [{ "google_search": {} }],
                    systemInstruction: {
                        parts: [{ text: systemPrompt }]
                    },
                };

                const apiResponse = await fetchWithRetry(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                let generatedText = "Не вдалося отримати відповідь від AI.";
                if (apiResponse && apiResponse.candidates && apiResponse.candidates.length > 0) {
                    generatedText = apiResponse.candidates[0].content.parts[0].text;
                }

                resultMessage.textContent = generatedText;

            } catch (error) {
                console.error("Помилка при виконанні запиту до AI:", error);
                resultMessage.textContent = `Помилка: Не вдалося отримати допомогу. Перевірте підключення до мережі. Деталі: ${error.message}`;
                resultMessage.classList.remove('bg-gray-50', 'text-gray-800');
                resultMessage.classList.add('bg-red-100', 'text-red-700');
            } finally {
                // Восстановление состояния
                loadingIndicator.classList.add('hidden');
                submitButton.disabled = false;
                assistantImage.classList.remove('loading-animation');
            }
        }
    </script>
</body>
</html>
