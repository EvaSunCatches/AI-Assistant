<!--
  AI Ассистент для 5-го Класса
  Реализован на чистом HTML/Tailwind CSS/JavaScript
  Включает новую двухколоночную структуру и дизайн с градиентами и эффектами.
  Логика AI-помощника строго сохранена согласно предыдущим инструкциям.
-->
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Освітній Асистент</title>
    <!-- Загрузка Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Загрузка шрифта, имитирующего "закругленные буквы" (Varela Round) -->
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Мягкие, нетоксичные градиентные цвета */
            --soft-blue: #D1E9FF; /* Легкий голубой */
            --soft-yellow: #FFF8E1; /* Легкий желтый */
            --header-gradient: linear-gradient(90deg, var(--soft-blue) 0%, var(--soft-yellow) 100%);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f7f7;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            min-height: 100vh;
        }
        /* Применяем Varela Round ко всему тексту в шапке */
        .app-title, .app-subtitle {
            font-family: 'Varela Round', sans-serif;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        .header-gradient {
            background: var(--header-gradient);
        }
        .container {
            max-width: 1200px;
            width: 100%;
            background-color: #ffffff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        .response-box {
            white-space: pre-wrap;
            overflow-wrap: break-word;
            text-align: left;
            min-height: 150px;
        }
        .loading-animation {
            border: 4px solid rgba(0, 0, 0, .1);
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Анимация "биения сердца" для ассистента */
        @keyframes pulse-shadow {
            0% {
                box-shadow: 0 0 5px rgba(59, 130, 246, 0.4), 0 0 10px rgba(59, 130, 246, 0.2);
                transform: scale(1);
            }
            50% {
                box-shadow: 0 0 10px rgba(59, 130, 246, 0.8), 0 0 20px rgba(59, 130, 246, 0.5);
                transform: scale(1.01);
            }
            100% {
                box-shadow: 0 0 5px rgba(59, 130, 246, 0.4), 0 0 10px rgba(59, 130, 246, 0.2);
                transform: scale(1);
            }
        }
        .assistant-image {
            animation: pulse-shadow 3s infinite ease-in-out;
            object-fit: cover; /* Заполняет всю область */
        }

        /* Mobile adjustments: Stack columns */
        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            /* На мобильных устройствах ответ появляется под фото */
            #responseContainer {
                position: static !important; 
                background-color: #ffffff;
                color: #1f2937;
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

<div class="container rounded-xl overflow-hidden">

    <!-- HEADER with Gradient -->
    <header class="header-gradient p-6 md:p-8 text-center shadow-lg">
        <h1 class="app-title text-4xl md:text-5xl font-bold text-blue-900 mb-1">
            AI Освітній Асистент 5-й Клас 🇺🇦
        </h1>
        <p class="app-subtitle text-xl text-gray-700 font-semibold">Ваш персональний помічник у навчанні</p>
    </header>

    <!-- Main Content Grid -->
    <div class="main-grid grid grid-cols-1 lg:grid-cols-3">
        
        <!-- Left Column: Input Form -->
        <div class="lg:col-span-2 p-6 md:p-10 space-y-6">

            <!-- 1. Введіть ваше завдання (Заголовок) -->
            <h2 class="text-xl font-bold text-gray-800 mb-2">Введіть ваше завдання</h2>
            
            <!-- 2. Оберіть предмет -->
            <div>
                <label for="subjectSelect" class="block text-lg font-medium text-gray-700 mb-1">Оберіть предмет</label>
                <select id="subjectSelect" class="w-full p-3 border-2 border-gray-300 rounded-xl focus:ring-blue-500 focus:border-blue-500 transition duration-150 shadow-inner appearance-none bg-white">
                    <option value="Математика">Математика</option>
                    <option value="Українська мова">Українська мова</option>
                    <option value="Українська література">Українська література</option>
                    <option value="Історія України">Історія України</option>
                    <option value="Інший">Інший</option>
                </select>
            </div>
            
            <!-- 3. ДВА ВАРИАНТА ЗАГРУЗКИ: По ссылке / Загрузить фото -->
            <div class="grid grid-cols-1 gap-6">
                
                <!-- 3a. 1. За посиланням (URL) -->
                <div id="link-input-group" class="bg-blue-50 p-5 rounded-xl border border-blue-200 shadow-md space-y-3">
                    <label class="block text-lg font-bold text-blue-800 mb-3">1. За посиланням (підручник)</label>
                    
                    <!-- Поле URL -->
                    <div>
                        <label for="bookUrlInput" class="block text-sm font-medium text-gray-700 mb-1">URL посилання на підручник</label>
                        <input type="url" id="bookUrlInput" class="w-full p-2 border border-gray-300 rounded-lg text-sm shadow-inner" placeholder="https://pidruchnik.ua/..." />
                    </div>
                    
                    <!-- Раздел, Страница, Задание/Параграф -->
                    <div class="grid grid-cols-3 gap-3">
                        <div>
                            <label for="sectionInput" class="block text-sm font-medium text-gray-700 mb-1">Розділ</label>
                            <input type="text" id="sectionInput" class="w-full p-2 border border-gray-300 rounded-lg text-sm shadow-inner" placeholder="Напр., Геометрія" />
                        </div>
                        <div>
                            <label for="pageInput" class="block text-sm font-medium text-gray-700 mb-1">Сторінка</label>
                            <input type="text" id="pageInput" class="w-full p-2 border border-gray-300 rounded-lg text-sm shadow-inner" placeholder="Напр., 25" />
                        </div>
                        <div>
                            <label for="taskNumberInput" class="block text-sm font-medium text-gray-700 mb-1">Завдання/Параграф</label>
                            <input type="text" id="taskNumberInput" class="w-full p-2 border border-gray-300 rounded-lg text-sm shadow-inner" placeholder="Напр., 57 або §4" />
                        </div>
                    </div>
                </div>

                <!-- 3b. 2. Завантажити фото -->
                <div id="file-input-group" class="bg-yellow-50 p-5 rounded-xl border border-yellow-200 shadow-md space-y-3">
                    <label class="block text-lg font-bold text-orange-800 mb-3">2. Завантажити фото</label>
                    <input type="file" id="fileInput" accept="image/*" class="w-full p-3 border-2 border-gray-300 rounded-xl bg-white file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-orange-100 file:text-orange-700 hover:file:bg-orange-200 transition duration-150" title="Вибрати файл або зробити фото">
                    
                    <div id="imagePreview" class="mt-3 hidden text-center p-3 border-t border-gray-200">
                        <p class="text-xs text-gray-500 mb-2">Попередній перегляд:</p>
                        <img id="previewImg" class="max-w-full max-h-40 mx-auto rounded-lg shadow-lg" alt="Попередній перегляд зображення" onerror="this.style.display='none';" onload="this.style.display='block';">
                    </div>
                </div>

                <!-- 4. Что необходимо сделать (текстовое описание) -->
                <div>
                    <label for="taskInput" class="block text-lg font-bold text-gray-800 mb-1">Вкажіть, що необхідно зробити</label>
                    <textarea id="taskInput" rows="3" class="w-full p-3 border-2 border-gray-300 rounded-xl focus:ring-blue-500 focus:border-blue-500 transition duration-150 shadow-inner" placeholder="Наприклад: 'Вирішити рівняння' або 'Проаналізувати текст з фото'."></textarea>
                </div>
            </div>

            <!-- Кнопка и статус - Изменена на мягкий синий цвет -->
            <button id="submitButton" class="w-full py-4 px-4 mt-6 bg-blue-600 text-white font-bold text-xl rounded-xl shadow-lg hover:bg-blue-700 transition duration-200 focus:outline-none focus:ring-4 focus:ring-blue-500 focus:ring-opacity-50 flex items-center justify-center" onclick="getAssistantHelp()">
                <span id="buttonText">Отримати допомогу асистента</span>
                <div id="spinner" class="loading-animation hidden ml-2"></div>
            </button>

            <div id="errorMessage" class="hidden p-3 bg-red-100 text-red-700 rounded-lg" role="alert"></div>

        </div> <!-- End Left Column -->

        <!-- Right Column: Assistant Photo & Response -->
        <div class="lg:col-span-1 bg-gray-50 flex flex-col justify-between relative min-h-[600px] lg:min-h-full">

            <!-- 5. Assistant Photo -->
            <div class="relative flex-grow rounded-none overflow-hidden shadow-2xl border-l border-gray-200 lg:h-full">
                <!-- ВАЖНО: ЗАМЕНИТЕ ЭТУ ССЫЛКУ НА ВАШ URL ИЗОБРАЖЕНИЯ С GITHUB/ХОСТИНГА -->
                <img src="https://placehold.co/400x1000/4F46E5/FFF?text=AI+Assistant+(Replace+this+URL)" 
                     id="assistantPhoto" 
                     class="assistant-image w-full h-full object-cover" 
                     alt="AI Асистент"
                     onerror="this.src='https://placehold.co/400x1000/4F46E5/FFF?text=AI+Assistant';">
                
                <!-- Заглушка для ответа (абсолютно позиционирована) -->
                <div id="responseContainer" class="absolute inset-0 p-4 flex flex-col justify-center items-center text-white text-center response-box transition-opacity duration-300 lg:static lg:bg-transparent lg:p-10 lg:h-full">
                    <h2 class="text-2xl font-bold mb-2">Розв'язання та пояснення</h2>
                    <p class="text-lg mt-4">Тут з'явиться відповідь.</p>
                    <p class="text-base font-light">Заповніть форму ліворуч, щоб почати.</p>
                </div>
            </div>
            
            <!-- Ссылки/Источники (будут появляться ниже фото) -->
            <div id="sourcesContainer" class="text-sm text-gray-600 p-4"></div>

        </div> <!-- End Right Column -->
    </div>

</div>

<script>
    // Глобальные переменные для конфигурации
    const API_MODEL = 'gemini-2.5-flash-preview-09-2025';
    const API_KEY = ""; // Будет предоставлен Canvas
    const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/${API_MODEL}:generateContent?key=${API_KEY}`;
    
    // Элементы DOM
    const taskInput = document.getElementById('taskInput'); // Теперь это поле "Вкажіть, що необхідно зробити"
    const sectionInput = document.getElementById('sectionInput'); // Новое поле "Розділ"
    const subjectSelect = document.getElementById('subjectSelect');
    const fileInput = document.getElementById('fileInput');
    const bookUrlInput = document.getElementById('bookUrlInput'); 
    const pageInput = document.getElementById('pageInput'); 
    const taskNumberInput = document.getElementById('taskNumberInput'); 
    const submitButton = document.getElementById('submitButton');
    const buttonText = document.getElementById('buttonText');
    const spinner = document.getElementById('spinner');
    const responseContainer = document.getElementById('responseContainer');
    const sourcesContainer = document.getElementById('sourcesContainer');
    const errorMessage = document.getElementById('errorMessage');
    const imagePreview = document.getElementById('imagePreview');
    const previewImg = document.getElementById('previewImg');
    const assistantPhoto = document.getElementById('assistantPhoto');


    let base64Image = null; 
    let base64MimeType = null; 

    // 1. Предварительный просмотр изображения
    fileInput.addEventListener('change', (event) => {
        const file = event.target.files[0];
        if (file) {
            // Разрешаем делать фото (используем input type="file" без capture="camera" для кросс-совместимости)
            // Пользователь сам выбирает: файл или камера.

            const reader = new FileReader();
            reader.onload = (e) => {
                const imgDataUrl = e.target.result;
                previewImg.src = imgDataUrl;
                imagePreview.classList.remove('hidden');

                const parts = imgDataUrl.split(',');
                base64Image = parts.length > 1 ? parts[1] : null;
                base64MimeType = file.type; 
            };
            reader.readAsDataURL(file);
        } else {
            imagePreview.classList.add('hidden');
            previewImg.src = '';
            base64Image = null;
            base64MimeType = null; 
        }
    });

    /**
     * Повторные попытки с экспоненциальным откатом для вызова API.
     * @param {function} fn - Асинхронная функция для выполнения.
     * @param {number} retries - Максимальное количество попыток.
     */
    const retryFetch = async (fn, retries = 3) => {
        for (let i = 0; i < retries; i++) {
            try {
                return await fn();
            } catch (error) {
                if (i === retries - 1) throw error;
                const delay = Math.pow(2, i) * 1000;
                await new Promise(resolve => setTimeout(resolve, delay));
            }
        }
    };

    // ФУНКЦИЯ ДЛЯ УПРАВЛЕНИЯ ВИДИМОСТЬЮ ОТВЕТА
    function displayResponse(text, isError = false) {
        
        // Находим контейнер для изображения (фон)
        const photoContainer = assistantPhoto.parentElement; 
        
        // Убираем старые стили
        responseContainer.classList.remove('bg-red-700', 'bg-opacity-90', 'bg-black', 'bg-opacity-70', 'text-white', 'lg:static');
        responseContainer.classList.add('p-4'); 

        // На мобильных устройствах ответ всегда идет поверх фото или под ним (если static)
        if (window.innerWidth < 1024) {
            responseContainer.style.position = 'static'; // Ответ под фото
            responseContainer.classList.remove('text-white');
            responseContainer.classList.add('bg-white', 'shadow-lg');
            photoContainer.classList.add('hidden'); // Скрываем фото, если показываем длинный ответ
        } else {
             // На десктопе ответ поверх изображения
             responseContainer.style.position = 'absolute';
             responseContainer.classList.add('bg-black', 'bg-opacity-70', 'text-white');
             photoContainer.classList.remove('hidden'); 
        }


        if (isError) {
            responseContainer.innerHTML = `<h2 class="text-2xl font-bold mb-2">Помилка</h2><p class="text-lg mt-4">${text}</p><p class="text-base font-light">Спробуйте ще раз або змініть завдання.</p>`;
            responseContainer.classList.remove('bg-black', 'bg-opacity-70', 'text-white');
            responseContainer.classList.add('bg-red-700', 'bg-opacity-90', 'text-white');
        } else if (text === 'loading') {
            responseContainer.innerHTML = '<div class="loading-animation mx-auto"></div><p class="text-lg mt-4 animate-pulse">Генерую пояснення...</p>';
            responseContainer.classList.add('bg-black', 'bg-opacity-70', 'text-white'); // При загрузке всегда поверх фото
            responseContainer.style.position = 'absolute';
            photoContainer.classList.remove('hidden');

        } else {
            // Отображаем финальный ответ
            // Используем библиотеку marked (через CDN) для конвертации Markdown в HTML
            if (window.marked) {
                const htmlText = window.marked.parse(text);
                responseContainer.innerHTML = `<h2 class="text-xl font-bold mb-2 text-gray-900 border-b pb-2">Розв'язання та пояснення</h2><div class="text-left overflow-auto max-h-[80vh] pt-4 text-gray-800">${htmlText}</div>`;
            } else {
                 responseContainer.innerHTML = `<h2 class="text-xl font-bold mb-2 text-gray-900 border-b pb-2">Розв'язання та пояснення</h2><div class="text-left overflow-auto max-h-[80vh] pt-4 text-gray-800">${text}</div>`;
            }
            
            // Финальный ответ всегда светлый для читабельности
            responseContainer.classList.remove('bg-black', 'bg-opacity-70', 'text-white');
            responseContainer.classList.add('bg-white', 'text-gray-800', 'p-4', 'border', 'border-gray-200', 'shadow-inner');
        }
    }


    /**
     * Основная функция для получения помощи от AI.
     */
    async function getAssistantHelp() {
        // Сброс состояния
        displayResponse('loading'); // Показываем загрузку
        sourcesContainer.innerHTML = '';
        errorMessage.classList.add('hidden');
        submitButton.disabled = true;
        buttonText.textContent = 'Очікування відповіді...';
        spinner.classList.remove('hidden');

        const userTask = taskInput.value.trim(); // "Вкажіть, що необхідно зробити"
        const subject = subjectSelect.value;
        const bookUrl = bookUrlInput.value.trim();
        const section = sectionInput.value.trim(); // Новое поле
        const pageNumber = pageInput.value.trim(); 
        const taskNumber = taskNumberInput.value.trim(); 

        if (!userTask && !base64Image && !bookUrl) {
            displayResponse('Будь ласка, вкажіть, що потрібно зробити, або завантажте матеріали (фото/посилання).', true);
            submitButton.disabled = false;
            buttonText.textContent = 'Отримати допомогу асистента';
            spinner.classList.add('hidden');
            return;
        }

        try {
            // 1. Формирование системного запроса (System Instruction)
            const systemPrompt = `Ти експерт з українського навчального плану 5 класу. Твоя роль - надавати зрозумілі, детальні та навчальні відповіді, які допомагають учням, а не просто дають готові рішення. 
            Фокус: На предметі "${subject}".
            
            Принципи відповіді:
            1. Розбивай складні завдання на прості кроки.
            2. Використовуй дружній, заохочувальний тон вчителя.
            3. Завжди надавай повне пояснення "Чому це так?" після основної відповіді.
            4. Якщо є зображення, проаналізуй його та інтегруй в пояснення.
            5. Посилаєшся на підручник, розділ, сторінку або параграф, якщо ці дані надані.
            6. Мова відповіді: Українська.`;

            // 2. Формирование пользовательского запроса (Contents)
            let userQuery = `Допоможи мені з предметом "${subject}".`;
            
            if (userTask) {
                userQuery += ` \n\nЩо необхідно зробити: ${userTask}.`;
            }

            if (bookUrl || section || pageNumber || taskNumber) {
                userQuery += "\n\nДеталі матеріалу (підручника):";
                if (bookUrl) userQuery += ` Посилання: ${bookUrl}.`;
                if (section) userQuery += ` Розділ: ${section}.`;
                if (pageNumber) userQuery += ` Сторінка: ${pageNumber}.`;
                if (taskNumber) userQuery += ` Завдання/Параграф: ${taskNumber}.`;
            }

            const contents = [
                {
                    role: "user",
                    parts: [{ text: userQuery }]
                }
            ];

            // Если есть изображение, добавляем его в части
            if (base64Image && base64MimeType) {
                const imagePart = {
                    inlineData: {
                        mimeType: base64MimeType,
                        data: base64Image
                    }
                };
                contents[0].parts.push(imagePart);
            }


            // 3. Формирование Payload
            const payload = {
                contents: contents,
                tools: [{ "google_search": {} }],
                systemInstruction: {
                    parts: [{ text: systemPrompt }]
                },
                config: {
                    temperature: 0.2, 
                    maxOutputTokens: 4096 
                }
            };

            // 4. Вызов API с повторами
            const response = await retryFetch(async () => {
                return await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            });

            const result = await response.json();
            const candidate = result.candidates?.[0];

            if (!candidate || !candidate.content?.parts?.[0]?.text) {
                if (result.error && result.error.message) {
                    throw new Error(`Помилка API: ${result.error.message}`);
                }
                throw new Error("Не вдалося отримати коректну відповідь від AI.");
            }

            // 5. Обработка ответа
            let generatedText = candidate.content.parts[0].text;
            
            // Очистка ответа
            generatedText = generatedText.replace(/^(#+\s*|Відповідь:|Розв'язання:)\s*/i, '').trim();

            displayResponse(generatedText);


            // 6. Извлечение источников (Grounding Sources)
            let sources = [];
            const groundingMetadata = candidate.groundingMetadata;
            if (groundingMetadata && groundingMetadata.groundingAttributions) {
                sources = groundingMetadata.groundingAttributions
                    .map(attribution => ({
                        uri: attribution.web?.uri,
                        title: attribution.web?.title,
                    }))
                    .filter(source => source.uri && source.title);
            }

            if (sources.length > 0) {
                let sourcesHtml = '<p class="font-medium text-gray-700">Джерела інформації:</p>';
                sources.forEach((source, index) => {
                    sourcesHtml += `<div class="mt-1"><a href="${source.uri}" target="_blank" class="text-blue-600 hover:underline"> [${index + 1}] ${source.title}</a></div>`;
                });
                sourcesContainer.innerHTML = sourcesHtml;
            } else {
                sourcesContainer.innerHTML = '';
            }

        } catch (error) {
            console.error("Gemini API Error:", error);
            errorMessage.textContent = `Сталася помилка: ${error.message}. Спробуйте ще раз.`;
            errorMessage.classList.remove('hidden');
            displayResponse('Виникла помилка під час обробки завдання. Перевірте консоль для деталей.', true);
        } finally {
            submitButton.disabled = false;
            buttonText.textContent = 'Отримати допомогу асистента';
            spinner.classList.add('hidden');
        }
    }

    // Загрузка библиотеки marked для конвертации Markdown в HTML
    // Это нужно, чтобы ответы AI выглядели форматированными (жирный текст, списки, ссылки).
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/marked/4.0.12/marked.min.js';
    document.head.appendChild(script);

    // Инициализация
    window.onload = function() {
        console.log("AI Assistant loaded.");
    };

</script>
