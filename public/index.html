<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI OCR Assistant v7.6-FIX</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background: #f4f6f8;
        color: #222;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      h1 {
        margin-top: 20px;
        color: #0077cc;
      }

      .container {
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        padding: 20px;
        width: 90%;
        max-width: 900px;
        margin-top: 20px;
      }

      .controls {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-bottom: 20px;
      }

      button {
        background-color: #0077cc;
        border: none;
        color: white;
        padding: 10px 18px;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.3s;
        font-weight: 500;
      }

      button:hover {
        background-color: #005fa3;
      }

      #output {
        white-space: pre-wrap;
        background: #fafafa;
        padding: 15px;
        border-radius: 10px;
        border: 1px solid #ddd;
        margin-top: 20px;
        font-family: monospace;
        overflow-x: auto;
      }

      .image-area {
        position: relative;
        display: inline-block;
        margin-top: 15px;
      }

      #imagePreview {
        max-width: 100%;
        border-radius: 10px;
      }

      #bboxCanvas {
        position: absolute;
        top: 0;
        left: 0;
        pointer-events: none;
      }

      footer {
        margin: 30px 0;
        color: #777;
        font-size: 0.9em;
      }
    </style>
  </head>
  <body>
    <h1>🧠 AI OCR Assistant v7.6-FIX</h1>

    <div class="container">
      <div class="controls">
        <input type="file" id="fileInput" accept="image/*" />
        <button id="analyzeBtn">🔍 Розпізнати</button>
        <button id="clearBtn">🧹 Очистити</button>
        <button id="logsBtn">📜 Логи</button>
        <button id="historyBtn">🕓 Історія</button>
        <button id="statsBtn">📊 Статистика</button>
      </div>

      <div class="image-area">
        <img id="imagePreview" />
        <canvas id="bboxCanvas"></canvas>
      </div>

      <div id="output">Результат з'явиться тут...</div>
    </div>

    <footer>v7.6-FIX | Render Cloud Deployment</footer>

    <script src="app.js"></script>
    <script>
      // Навигационные кнопки для интерфейса
      document.getElementById("logsBtn").onclick = async () => {
        const res = await fetch("/logs");
        document.getElementById("output").textContent = await res.text();
      };

      document.getElementById("historyBtn").onclick = async () => {
        const res = await fetch("/history");
        document.getElementById("output").textContent = await res.text();
      };

      document.getElementById("statsBtn").onclick = async () => {
        const res = await fetch("/stats");
        document.getElementById("output").textContent = await res.text();
      };
    </script>
  </body>
</html>
