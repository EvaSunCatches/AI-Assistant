<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>🧠 AI Educational Assistant — OCR Analyzer</title>
  <style>
    body {
      font-family: 'Inter', Arial, sans-serif;
      background: #f7f7f9;
      color: #111;
      text-align: center;
      margin: 0;
      padding: 20px;
    }
    h1 {
      font-size: 26px;
      margin-bottom: 10px;
      color: #333;
    }
    .btn {
      margin: 6px;
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: #4b7bec;
      color: white;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn:hover {
      background: #3867d6;
    }
    .secondary {
      background: #20bf6b;
    }
    .warn {
      background: #eb3b5a;
    }
    .panel {
      max-width: 800px;
      margin: 20px auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.1);
      padding: 20px;
    }
    #preview {
      max-width: 100%;
      margin-top: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      position: relative;
    }
    #canvas {
      position: absolute;
      left: 0;
      top: 0;
    }
    pre {
      text-align: left;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 14px;
      background: #f0f0f0;
      padding: 10px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <h1>🧠 OCR Аналізатор (AI Educational Assistant)</h1>

  <div class="panel">
    <input type="file" id="fileInput" accept="image/*" />
    <div>
      <button class="btn" id="analyzeBtn">Розпізнати</button>
      <button class="btn warn" id="clearBtn">Очистити все</button>
    </div>
    <div>
      <button class="btn secondary" onclick="window.open('/logs','_blank')">📜 Логи</button>
      <button class="btn secondary" onclick="window.open('/history','_blank')">🖼️ Історія</button>
      <button class="btn secondary" onclick="window.open('/stats','_blank')">📊 Статистика</button>
    </div>

    <div style="position:relative;display:inline-block;">
      <img id="preview" src="" alt="Preview">
      <canvas id="canvas"></canvas>
    </div>

    <pre id="output"></pre>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const clearBtn = document.getElementById('clearBtn');
    const output = document.getElementById('output');
    const preview = document.getElementById('preview');
    const canvas = document.getElementById('canvas');

    let file;

    fileInput.onchange = e => {
      file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = ev => preview.src = ev.target.result;
        reader.readAsDataURL(file);
      }
    };

    analyzeBtn.onclick = async () => {
      if (!file) {
        alert("Будь ласка, виберіть зображення!");
        return;
      }
      output.textContent = "⏳ Обробка...";
      const formData = new FormData();
      formData.append("image", file);

      try {
        const res = await fetch("/api/vision", { method: "POST", body: formData });
        const data = await res.json();
        output.textContent = JSON.stringify(data, null, 2);

        if (data.words && data.words.length > 0) {
          drawBoxes(data.words);
        }
      } catch (err) {
        output.textContent = "❌ Помилка запиту: " + err.message;
      }
    };

    clearBtn.onclick = async () => {
      await fetch("/api/clear", { method: "POST" });
      output.textContent = "🧹 Очищено!";
      preview.src = "";
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    };

    function drawBoxes(words) {
      const ctx = canvas.getContext("2d");
      canvas.width = preview.width;
      canvas.height = preview.height;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.lineWidth = 2;
      ctx.strokeStyle = "rgba(255,0,0,0.7)";
      words.forEach(w => {
        const { x, y, w: wbox, h } = w.bbox || {};
        if (x && y && wbox && h) ctx.strokeRect(x / 10, y / 10, wbox / 10, h / 10);
      });
    }
  </script>
</body>
</html>
