name: Deploy to GitHub Pages and Inject API Key

on:
  push:
    branches:
      - main  # Убедитесь, что это ваша основная ветка

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # Требуется для нового механизма деплоя Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    # Требуется для OIDC-токена и записи в репозиторий
    permissions:
      contents: read
      pages: write
      id-token: write
      
    # 💡 ИСПОЛЬЗУЕМ БЛОК ENV ДЛЯ НАДЕЖНОЙ ПЕРЕДАЧИ КЛЮЧА
    env:
      GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout 
        uses: actions/checkout@v4

      - name: Inject API Key into index.html (Reliable method)
        run: |
          # Используем переменную окружения GEMINI_KEY для замены маркера
          # Теперь команда sed гарантированно найдет маркер, если он есть в index.html,
          # и вставит туда ключ, взятый из ENV.
          sed -i "s|// 💡 \\[GEMINI_API_KEY_MARKER\\].*|const __api_key = \"${GEMINI_KEY}\";\n    const apiKey = typeof __api_key !== 'undefined' ? __api_key : '';|" index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Загружаем все файлы из корня (включая измененный index.html)
          path: . 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
