name: Deploy to GitHub Pages and Inject API Key

on:
  push:
    branches:
      - main  # Переконайтеся, що це ваша основна гілка ('main' або 'master')
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # ОБОВ'ЯЗКОВІ ПРАВА ДЛЯ РОЗГОРТАННЯ
    permissions:
      contents: write
      pages: write
      id-token: write
      
    # ВИПРАВЛЕННЯ ПОМИЛКИ: Додано блок environment для GitHub Pages
    environment:
      name: github-pages

    env:
      # Використовуємо GEMINI_API_KEY з секретів, як ви його назвали
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      # 1. СЕКЦІЯ ВСТАВКИ API KEY (ВИПРАВЛЕНО)
      - name: Inject API Key into index.html
        run: |
          # Нова команда sed: шукаємо рядок 'const apiKey = '';'
          # і замінюємо його на 'const apiKey = "ВАШ_КЛЮЧ";'
          # Це вирішує проблему ReferenceError та SyntaxError.
          sed -i 's|const apiKey = '"''"';|const apiKey = "${{ env.GEMINI_API_KEY }}";|g' index.html
          
          # *** ДІАГНОСТИКА: ПЕРЕВІРКА, ЧИ КЛЮЧ БУВ ВСТАВЛЕНИЙ ***
          echo "Перевірка вставки API Key (побачите початок ключа):"
          grep 'const apiKey = ' index.html
        
      # 2. Setup Pages (обов'язковий крок для використання gh-pages)
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # 3. РОЗГОРТАННЯ НА GITHUB PAGES
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: . # Завантажуємо всі файли з кореневої папки
          
      - name: Deploy to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v4
