name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Або 'master', якщо ви використовуєте стару назву гілки

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      # 1. СЕКЦІЯ ВСТАВКИ API KEY (ВИПРАВЛЕНО)
      # Цей крок використовує SED для пошуку маркеру і вставки ключа
      - name: Inject API Key into index.html
        run: |
          # Вставлення секрету GEMINI_API_KEY у JavaScript змінну apiKey у файлі index.html
          # Маркер // 💡 [GEMINI_API_KEY_MARKER] повинен бути присутній у вашому index.html
          sed -i "s|// 💡 \[GEMINI_API_KEY_MARKER\]|// 💡 \[GEMINI_API_KEY_MARKER\]\n        const apiKey = \"${{ secrets.GEMINI_API_KEY }}\";|g" index.html
          
          # *** ДІАГНОСТИКА: ПЕРЕВІРКА, ЧИ КЛЮЧ БУВ ВСТАВЛЕНИЙ ***
          # GitHub автоматично приховує секрети в логах, тому ви побачите лише початок.
          echo "Перевірка вставки API Key (побачите початок ключа):"
          grep 'const apiKey = ' index.html
        env:
          # Важливо: використовуйте ім'я секрету, яке ви створили в налаштуваннях репозиторію
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}


      # 2. РОЗГОРТАННЯ НА GITHUB PAGES
      - name: Deploy to GitHub Pages 🚀
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./ # Розгортаємо кореневу папку, де знаходиться index.html
          publish_branch: gh-pages # Гілка для розгортання вашого сайту (змініть, якщо потрібно)
          cname: '' # Залиште порожнім, якщо не використовуєте власний домен
