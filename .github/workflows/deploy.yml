name: Deploy to GitHub Pages and Inject API Key

on:
  push:
    branches:
      - main  # Переконайтеся, що це ваша основна гілка
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write
      
    # ВИПРАВЛЕННЯ ПОМИЛКИ: Додано блок environment для gh-pages
    environment:
      name: github-pages

    env:
      # Змінна середовища для доступу до секрету
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
        
      # 1. СЕКЦІЯ ВСТАВКИ API KEY (використовуємо простий і надійний маркер)
      - name: Inject API Key into index.html
        run: |
          # Замінюємо маркер у index.html на оголошення змінної apiKey
          # У index.html має бути рядок: const apiKey = '';
          sed -i 's|const apiKey = '"''"';|const apiKey = "${{ env.GEMINI_API_KEY }}";|g' index.html
          
          # *** ДІАГНОСТИКА: ПЕРЕВІРКА ***
          echo "Перевірка вставки API Key (побачите початок ключа):"
          grep 'const apiKey = ' index.html
        
      # 2. Setup Pages (обов'язковий крок)
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # 3. РОЗГОРТАННЯ
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
          
      - name: Deploy to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v4
