name: Deploy to GitHub Pages and Inject API Key

on:
  push:
    branches:
      - main  # Переконайтеся, що це ваша основна гілка
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write
      
    environment:
      name: github-pages

    env:
      # Змінна середовища для доступу до секрету
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
        
      # 1. СЕКЦІЯ ВСТАВКИ API KEY (використовуємо максимально стійку логіку sed)
      - name: Inject API Key into index.html
        # Використовуємо екранування змінної та символ # як роздільник
        run: |
          API_KEY_VALUE="${{ env.GEMINI_API_KEY }}"
          
          # Заміна 'const apiKey = '';' на 'const apiKey = "ВАШ_КЛЮЧ";'
          # Ключ тепер обгорнутий подвійними лапками для коректного JS.
          sed -i "s#const apiKey = '';#const apiKey = \"$API_KEY_VALUE\";#g" index.html
          
          # *** ДІАГНОСТИКА: ПЕРЕВІРКА ***
          echo "Перевірка вставки API Key (побачите початок ключа):"
          grep 'const apiKey = ' index.html
        
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
          
      - name: Deploy to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v4
