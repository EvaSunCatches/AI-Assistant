name: Deploy and Inject Key

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    permissions:
      contents: read
      pages: write
      id-token: write
      
    env:
      GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout 
        uses: actions/checkout@v4
      
      # *** ДИАГНОСТИКА: ПРОВЕРКА КЛЮЧА ***
      - name: Check GEMINI_KEY visibility
        run: |
          echo "Key length is: $(echo -n "${GEMINI_KEY}" | wc -c) characters"

      # *** ИСПРАВЛЕНИЕ: ВНЕДРЕНИЕ КЛЮЧА И ПЕРЕМЕННОЙ apiKey (без конфликта) ***
      - name: Inject API Key into index.html
        run: |
          # Внедряем ключ, попутно объявляя переменную apiKey.
          # Новый маркер - это строка, начинающаяся с `// 💡 [GEMINI_API_KEY_MARKER]`
          sed -i "s|// 💡 \\[GEMINI_API_KEY_MARKER\\]|const __api_key = \"${GEMINI_KEY}\";\n    const apiKey = typeof __api_key !== 'undefined' ? __api_key : '';\n    // 💡 [GEMINI_API_KEY_MARKER]|" index.html
          
          # Очистка: удаляем маркеры после внедрения.
          sed -i "/\/\/ 💡 \\[GEMINI_API_KEY_MARKER\\]/d" index.html


      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: . 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
