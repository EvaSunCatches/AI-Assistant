name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # Визначаємо змінну середовища GEMINI_API_KEY для використання в усіх кроках job, що стосуються ключа
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true  # Рекурсивне клонування, якщо є підмодулі

      - name: Inject API Key into index.html
        # Цей крок замінює заглушку const apiKey = ''; на фактичний ключ із Secrets
        run: |
          # Перевірка, чи існує файл index.html
          if [ ! -f index.html ]; then
            echo "Error: index.html not found!"
            exit 1
          fi

          # 1. Заміна: const apiKey = ''; -> const apiKey = 'AIzaSy...';
          # Використовуємо $GEMINI_API_KEY, визначений у секції env.
          # Одинарні лапки всередині подвійних забезпечують коректний JavaScript-синтаксис.
          sed -i "s|const apiKey = '';|const apiKey = '$GEMINI_API_KEY';|g" index.html
          
          echo "API Key successfully injected into index.html."
          
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './' # Завантажуємо всі файли з кореневого каталогу, включно з оновленим index.html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
