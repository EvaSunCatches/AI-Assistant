name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Переконайтеся, що це ваша основна гілка ('main' або 'master')

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      # 1. СЕКЦІЯ ВСТАВКИ API KEY (ВИПРАВЛЕНО)
      # Запобігає помилці "apiKey is not defined" та конфлікту оголошення
      - name: Inject API Key into index.html
        run: |
          # Вставляємо 'const apiKey = "ВАШ_КЛЮЧ";' прямо перед маркером
          # Маркер // 💡 [GEMINI_API_KEY_MARKER] в index.html буде замінений на інжекцію ключа + резервну змінну.
          sed -i 's|// 💡 \[GEMINI_API_KEY_MARKER\]|const apiKey = "${{ env.GEMINI_API_KEY }}";\n// 💡 \[GEMINI_API_KEY_MARKER\]|g' index.html
          
          # *** ДІАГНОСТИКА: ПЕРЕВІРКА, ЧИ КЛЮЧ БУВ ВСТАВЛЕНИЙ ***
          echo "Перевірка вставки API Key (побачите початок ключа):"
          grep 'const apiKey = ' index.html
        env:
          # Важливо: використовуйте ім'я секрету, яке ви створили в налаштуваннях репозиторію
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}


      # 2. РОЗГОРТАННЯ НА GITHUB PAGES
      - name: Deploy to GitHub Pages 🚀
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./ # Розгортаємо кореневу папку
          publish_branch: gh-pages # Гілка для розгортання вашого сайту (стандартна для Pages)
          cname: ''
