name: Deploy to GitHub Pages and Inject API Key

on:
  push:
    branches:
      - main  # Убедитесь, что это ваша основная ветка

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # Требуется для нового механизма деплоя Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    # Требуется для OIDC-токена, используемого для деплоя
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout 
        uses: actions/checkout@v4

      - name: Inject API Key into index.html
        run: |
          # Ищем маркер [GEMINI_API_KEY_MARKER] в index.html и заменяем его на реальную переменную __api_key
          # \n используется для разрыва строки в sed, чтобы код выглядел чисто.
          sed -i "s|// 💡 \\[GEMINI_API_KEY_MARKER\\].*|const __api_key = \"${{ secrets.GEMINI_API_KEY }}\";\n    const apiKey = typeof __api_key !== 'undefined' ? __api_key : '';|" index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Загружаем все файлы из корня (включая измененный index.html)
          path: . 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
