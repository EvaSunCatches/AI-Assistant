name: Deploy and Inject Key

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    permissions:
      contents: read
      pages: write
      id-token: write
      
    env:
      GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout 
        uses: actions/checkout@v4
      
      # *** ДИАГНОСТИКА: ПРОВЕРКА КЛЮЧА ***
      - name: Check GEMINI_KEY visibility
        run: |
          echo "Key length is: $(echo -n "${GEMINI_KEY}" | wc -c) characters"

      # *** ИСПРАВЛЕНИЕ: ВНЕДРЕНИЕ КЛЮЧА И ПЕРЕМЕННОЙ apiKey ***
      - name: Inject API Key into index.html
        run: |
          # Внедряем две переменные: __api_key для хранения ключа и apiKey для использования в URL.
          # Заменяем МАРКЕР на две строки JS-кода.
          # ВНИМАНИЕ: Маркер должен быть в файле index.html
          sed -i "s|// 💡 \\[GEMINI_API_KEY_MARKER\\]|const __api_key = \"${GEMINI_KEY}\";\n    const apiKey = typeof __api_key !== 'undefined' ? __api_key : '';|" index.html
          
          # *** ДИАГНОСТИКА: ПРОВЕРКА ВНЕДРЕНИЯ ***
          echo "--- Content after injection ---"
          grep 'const apiKey =' index.html
          echo "-------------------------------"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: . 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
