services:
  - type: web
    name: ai-educational-assistant
    env: node
    plan: free
    buildCommand: |
      apt-get update && apt-get install -y tesseract-ocr tesseract-ocr-eng tesseract-ocr-ukr
      npm install
    startCommand: node server.cjs
    envVars:
      - key: OCR_LANG
        value: eng+ukr
      - key: CLEANUP_INTERVAL
        value: 180
      - key: PORT
        value: 3000
    autoDeploy: true
    healthCheckPath: /
    region: frankfurt